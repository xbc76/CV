<style>
/* ============ RESET & APP SHELL ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  color-scheme: light;
  --app-bg:#eef6f8; --app-surface:#ffffff; --app-surface-2:#f3fafc;
  --app-text:#0b2630; --app-text-dim:#4f7480; --app-border:#d7eaef;
  --app-primary:#0891b2; --app-primary-dim:#e0f5fa; --app-accent:#0ea5e9;
  --app-danger:#ef4444; --app-radius:14px; --app-shadow:0 1px 3px rgba(20,20,40,.06), 0 8px 24px -12px rgba(20,20,40,.12);
}
body[data-theme="oscuro"]{
  color-scheme: dark;
  --app-bg:#0f1115; --app-surface:#171a21; --app-surface-2:#1d2027;
  --app-text:#eef0f3; --app-text-dim:#9aa1ac; --app-border:#2a2e37;
  --app-primary:#818cf8; --app-primary-dim:#262a45; --app-accent:#22d3ee;
  --app-shadow:0 1px 3px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
}
body[data-theme="claro"]{
  color-scheme: light;
  --app-bg:#eef6f8; --app-surface:#ffffff; --app-surface-2:#f3fafc;
  --app-text:#0b2630; --app-text-dim:#4f7480; --app-border:#d7eaef;
  --app-primary:#0891b2; --app-primary-dim:#e0f5fa; --app-accent:#0ea5e9;
}
body[data-theme="bosque"]{
  color-scheme: light;
  --app-bg:#f1f6ee; --app-surface:#ffffff; --app-surface-2:#f6f9f2;
  --app-text:#1c2a17; --app-text-dim:#5a6e51; --app-border:#dde9d4;
  --app-primary:#3f7d3f; --app-primary-dim:#e3f0e0; --app-accent:#84a98c;
}
body[data-theme="atardecer"]{
  color-scheme: light;
  --app-bg:#fdf3ec; --app-surface:#ffffff; --app-surface-2:#fff8f3;
  --app-text:#341a0f; --app-text-dim:#8a5a3f; --app-border:#f4ddc9;
  --app-primary:#ea580c; --app-primary-dim:#ffe8d6; --app-accent:#f43f5e;
}
body[data-theme="atardecerOsc"]{
  color-scheme: dark;
  --app-bg:#130b05; --app-surface:#1e1008; --app-surface-2:#251508;
  --app-text:#f5e6d8; --app-text-dim:#a07050; --app-border:#3a2010;
  --app-primary:#fb923c; --app-primary-dim:#2a1205; --app-accent:#f43f5e;
  --app-shadow:0 1px 3px rgba(0,0,0,.5), 0 8px 24px -12px rgba(0,0,0,.7);
}
body[data-theme="bosqueOsc"]{
  color-scheme: dark;
  --app-bg:#0d1411; --app-surface:#141d18; --app-surface-2:#1a2620;
  --app-text:#e8f5ee; --app-text-dim:#7ba88a; --app-border:#223329;
  --app-primary:#4ade80; --app-primary-dim:#152a1e; --app-accent:#86efac;
  --app-shadow:0 1px 3px rgba(0,0,0,.5), 0 8px 24px -12px rgba(0,0,0,.7);
}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--app-bg);color:var(--app-text);transition:background .25s,color .25s;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;color:inherit;}
.icon{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* ============ LAYOUT ============ */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--app-surface);border-bottom:1px solid var(--app-border);position:relative;z-index:25;flex-shrink:0;}
.brand{display:flex;flex-direction:column;align-items:center;gap:4px;}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--app-primary),var(--app-accent));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.brand .logo svg{width:19px;height:19px;}
.brand-text{font-weight:800;font-size:11.5px;letter-spacing:-.01em;text-align:center;white-space:nowrap;}
.brand-text span{display:none;}
.brand-accent{display:inline!important;color:var(--app-accent);}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.profiles-box{display:flex;align-items:center;gap:9px;padding:8px 16px 8px 8px;border-radius:999px;background:var(--app-primary-dim);color:var(--app-primary);font-weight:700;font-size:14px;max-width:190px;flex-shrink:0;transition:.15s;}
.profiles-box:hover{filter:brightness(.96);}
.menu-btn{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--app-surface-2);border:1px solid var(--app-border);color:var(--app-text);flex-shrink:0;transition:.15s;}
.menu-btn:hover{background:var(--app-primary-dim);color:var(--app-primary);}

.main{flex:1;overflow-y:auto;}
.topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb, var(--app-bg) 88%, transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--app-border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.topbar h1{font-size:19px;font-weight:700;letter-spacing:-.01em;}
.topbar p{font-size:12.5px;color:var(--app-text-dim);margin-top:2px;}
.view{padding:28px 32px 60px;max-width:1180px;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.15s;white-space:nowrap;}
.btn-primary{background:var(--app-primary);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--app-surface);border:1px solid var(--app-border);color:var(--app-text);}
.btn-ghost:hover{background:var(--app-surface-2);}
.btn-soft{background:var(--app-primary-dim);color:var(--app-primary);}
.btn-soft:hover{filter:brightness(1.05);}
.btn-danger{background:#fee2e2;color:var(--app-danger);}
.btn-danger:hover{filter:brightness(.97);}
.btn-sm{padding:7px 11px;font-size:12.5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ============ CARDS / SECTIONS ============ */
.card{background:var(--app-surface);border:1px solid var(--app-border);border-radius:var(--app-radius);box-shadow:var(--app-shadow);}
.card-pad{padding:22px 24px;}
.section-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:4px;}
.section-title .ic-badge{width:30px;height:30px;border-radius:9px;background:var(--app-primary-dim);color:var(--app-primary);display:flex;align-items:center;justify-content:center;}
.section-sub{font-size:12.5px;color:var(--app-text-dim);margin-bottom:16px;margin-left:40px;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:600;color:var(--app-text-dim);}
.field input,.field select,.field textarea{padding:10px 12px;border-radius:9px;border:1px solid var(--app-border);background:var(--app-surface-2);font-size:13.5px;color:var(--app-text);outline:none;transition:.15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--app-primary);background:var(--app-surface);}
.field textarea{resize:vertical;min-height:70px;}
.checkrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--app-text-dim);}
.doc-id-group{background:var(--app-surface-2);border:1px solid var(--app-border);border-radius:11px;padding:12px 14px 13px;gap:8px;}
.doc-id-group input[type="text"]{margin-bottom:2px;}
.doc-id-toggle{padding-top:9px;border-top:1px dashed var(--app-border);margin-top:2px;cursor:pointer;}
.doc-id-toggle input{flex-shrink:0;}

.entry-card{border:1px solid var(--app-border);border-radius:12px;padding:16px 18px;margin-bottom:12px;background:var(--app-surface-2);position:relative;}
.entry-card.collapsible{padding:0;overflow:hidden;}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.entry-card.collapsible .entry-head{margin-bottom:0;padding:13px 16px;cursor:pointer;gap:10px;}
.entry-card.collapsible .entry-head:hover{background:var(--app-bg);}
.entry-head-main{min-width:0;display:flex;flex-direction:column;gap:2px;}
.entry-head-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.entry-detail{font-size:11.5px;color:var(--app-text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chevron{display:flex;color:var(--app-text-dim);transition:transform .15s;}
.entry-card.open .chevron{transform:rotate(180deg);}
.entry-card.collapsible .entry-body{padding:4px 16px 16px;}
.entry-num{font-size:11.5px;font-weight:700;color:var(--app-text-dim);text-transform:uppercase;letter-spacing:.05em;}
.entry-card.collapsible .entry-num{font-size:13.5px;font-weight:700;color:var(--app-text);text-transform:none;letter-spacing:0;}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--app-text-dim);}
.icon-btn:hover{background:var(--app-bg);color:var(--app-danger);}
.empty-hint{text-align:center;padding:30px 10px;color:var(--app-text-dim);font-size:13px;border:1.5px dashed var(--app-border);border-radius:12px;}
.empty-hint svg{margin:0 auto 8px;display:block;opacity:.5;}

/* perfil header (ya no se usa: el cambio de perfil vive en la cabecera general) */

/* menú principal: fila "Perfiles" con avatar+nombre del activo */
.mi-ava{width:29px;height:29px;border-radius:50%;background:var(--app-surface);color:var(--app-primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden;flex-shrink:0;}
.mi-ava img{width:100%;height:100%;object-fit:cover;}
.mi-name{font-size:12px;font-weight:700;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.tabs-row{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:18px;-webkit-overflow-scrolling:touch;}
.tab-tile{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 10px;border-radius:16px;width:92px;flex-shrink:0;background:var(--app-surface);border:1px solid var(--app-border);color:var(--app-text-dim);font-size:11px;font-weight:600;line-height:1.25;text-align:center;transition:.15s;position:relative;}
.tab-tile:hover{border-color:var(--app-primary);}
.tab-tile-icon{width:36px;height:36px;border-radius:11px;background:var(--app-surface-2);display:flex;align-items:center;justify-content:center;color:var(--app-text-dim);transition:.15s;}
.tab-tile.active{background:var(--app-primary-dim);border-color:var(--app-primary);color:var(--app-primary);}
.tab-tile.active .tab-tile-icon{background:var(--app-primary);color:#fff;}
.tab-tile .count{position:absolute;top:7px;right:9px;font-size:9.5px;font-weight:700;background:var(--app-surface-2);color:var(--app-text-dim);min-width:16px;height:16px;padding:0 4px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
.tab-tile.active .count{background:var(--app-primary);color:#fff;}

/* tiles usados como botones de acción (Elegir plantilla / Guardar PDF) */
.action-tiles-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.action-tiles-row .tab-tile{width:108px;cursor:pointer;}
.tab-tile.tile-primary{background:var(--app-primary);border-color:var(--app-primary);color:#fff;}
.tab-tile.tile-primary .tab-tile-icon{background:rgba(255,255,255,.2);color:#fff;}
.tab-tile.tile-primary:hover{filter:brightness(1.06);}

/* photo uploader */
.photo-up{display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap;}
.photo-up .frame{width:84px;height:84px;border-radius:50%;background:var(--app-primary-dim);display:flex;align-items:center;justify-content:center;color:var(--app-primary);overflow:hidden;border:2px solid var(--app-border);flex-shrink:0;}
.photo-up .frame img{width:100%;height:100%;object-fit:cover;}
.photo-up-actions{display:flex;gap:8px;flex-wrap:wrap;min-width:0;flex:1;}

/* ============ PROFILE STRIP (selector dentro de Perfil) ============ */
.profile-strip{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 12px;-webkit-overflow-scrolling:touch;}
.profile-chip-lg{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0;width:74px;cursor:pointer;opacity:.55;transition:.15s;}
.profile-chip-lg:hover{opacity:.85;}
.profile-chip-lg.active{opacity:1;}
.profile-chip-lg .ava{width:56px;height:56px;border-radius:50%;background:var(--app-primary-dim);color:var(--app-primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;overflow:hidden;border:2px solid transparent;transition:.15s;}
.profile-chip-lg.active .ava{border-color:var(--app-primary);box-shadow:0 0 0 3px var(--app-primary-dim);}
.profile-chip-lg .ava img{width:100%;height:100%;object-fit:cover;}
.profile-chip-lg span{font-size:11px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.profile-chip-lg.add .ava{background:var(--app-surface-2);border:1.5px dashed var(--app-border);color:var(--app-text-dim);}
.profile-actions-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ============ PERFIL TABS (Introducir datos / Currículum / Carta de presentación) ============ */
.perfil-tabs{display:flex;gap:6px;margin:4px 0 22px;background:var(--app-surface-2);border:1px solid var(--app-border);border-radius:18px;padding:6px;box-shadow:var(--app-shadow);}
.perfil-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px 11px;border-radius:13px;font-size:11.5px;font-weight:700;color:var(--app-text-dim);transition:.18s;text-align:center;line-height:1.2;}
.perfil-tab:hover{color:var(--app-text);}
.perfil-tab .ptab-icon{width:32px;height:32px;border-radius:10px;background:var(--app-surface);display:flex;align-items:center;justify-content:center;color:var(--app-text-dim);transition:.18s;}
.perfil-tab:hover .ptab-icon{color:var(--app-text);}
.perfil-tab.active{background:var(--app-surface);color:var(--app-primary);box-shadow:0 4px 12px rgba(20,20,40,.12);}
.perfil-tab.active .ptab-icon{background:var(--app-primary);color:#fff;}

/* ============ TEMPLATES PICKER (modal) ============ */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px;}
.tpl-card{border-radius:14px;overflow:hidden;border:2px solid var(--app-border);background:var(--app-surface);cursor:pointer;transition:.15s;}
.tpl-card:hover{transform:translateY(-3px);box-shadow:var(--app-shadow);}
.tpl-card.selected{border-color:var(--app-primary);box-shadow:0 0 0 3px var(--app-primary-dim);}
.tpl-thumb{height:140px;position:relative;overflow:hidden;}
.tpl-thumb-scaled{position:absolute;top:0;left:0;width:400%;height:400%;transform:scale(.25);transform-origin:top left;pointer-events:none;}
.tpl-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--app-surface-2);color:var(--app-text-dim);font-size:11px;font-weight:600;text-align:center;padding:8px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.tpl-label{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
.tpl-label span{font-size:12.5px;font-weight:600;}
.tpl-label .chk{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--app-border);display:flex;align-items:center;justify-content:center;color:#fff;}
.tpl-card.selected .chk{background:var(--app-primary);border-color:var(--app-primary);}
.modal-tpl-grid{max-height:60vh;overflow-y:auto;margin-bottom:4px;padding-right:4px;}

/* ============ PREVIEW VIEW ============ */
.preview-wrap{display:flex;gap:24px;align-items:flex-start;}
.preview-stage{flex:1;background:#d9dce3;border-radius:16px;padding:34px;display:flex;justify-content:center;align-items:flex-start;overflow:hidden;touch-action:none;}
body[data-theme="oscuro"] .preview-stage{background:#05060a;}
.preview-side{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:90px;}
#cvCanvasHolder{transform-origin:top left;}

/* ============ OPTIONS VIEW ============ */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.theme-card{border-radius:14px;border:2px solid var(--app-border);padding:10px;cursor:pointer;transition:.15s;background:var(--app-surface);min-width:0;}
.theme-card:hover{transform:translateY(-2px);}
.theme-card.selected{border-color:var(--app-primary);box-shadow:0 0 0 3px var(--app-primary-dim);}
.theme-card b{font-size:13px;}
.theme-mockup{height:90px;border-radius:9px;margin-bottom:10px;overflow:hidden;border:1px solid var(--app-border);}
.info-rows{display:flex;flex-direction:column;gap:0;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--app-border);font-size:13.5px;}
.info-row:last-child{border-bottom:none;}
.info-row span{color:var(--app-text-dim);}
.info-row b{font-weight:700;letter-spacing:.01em;}

/* acordeón tipo cortina (Opciones) */
.accordion-item{margin-bottom:14px;}
.accordion-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--app-surface);border:1px solid var(--app-border);border-radius:14px;font-size:14.5px;font-weight:700;box-shadow:var(--app-shadow);transition:.15s;}
.accordion-trigger:hover{background:var(--app-surface-2);}
.acc-trigger-left{display:flex;align-items:center;gap:11px;}
.acc-chevron{display:flex;color:var(--app-text-dim);transition:transform .25s;}
.accordion-item.open .accordion-trigger{border-radius:14px 14px 0 0;border-bottom-color:transparent;}
.accordion-item.open .acc-chevron{transform:rotate(180deg);}
.accordion-panel{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--app-surface);border:1px solid var(--app-border);border-top:none;border-radius:0 0 14px 14px;}
.accordion-item.open .accordion-panel{max-height:900px;}
.accordion-panel-inner{padding:18px 20px 22px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--app-text);color:var(--app-bg);padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:9px;opacity:0;pointer-events:none;transition:.25s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.modal-bg{position:fixed;inset:0;background:rgba(15,17,21,.55);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:.18s;}
.modal-bg.show{opacity:1;pointer-events:auto;}
.modal{background:var(--app-surface);border-radius:16px;width:440px;max-width:90vw;max-height:84vh;overflow-y:auto;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.3);transform:translateY(10px) scale(.98);transition:.18s;}
.modal.modal-wide{width:760px;max-width:94vw;}
.modal-bg.show .modal{transform:translateY(0) scale(1);}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal p.desc{font-size:12.5px;color:var(--app-text-dim);margin-bottom:16px;}
.modal-close{position:absolute;}
.import-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-bottom:16px;}
.import-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--app-border);border-radius:10px;font-size:13px;}
.import-row .ava{width:28px;height:28px;border-radius:50%;background:var(--app-primary-dim);color:var(--app-primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;overflow:hidden;}
.import-row .ava img{width:100%;height:100%;object-fit:cover;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}

@media print{ body *{visibility:hidden;} }

/* ============ CV BASE STYLES (shared across templates) ============ */
.cv-page{width:794px;min-height:1123px;background:#fff;color:#222;position:relative;box-shadow:0 4px 30px rgba(0,0,0,.18);}
.cv-page *{box-sizing:border-box;}
.cv-header{display:flex;align-items:center;gap:22px;padding:34px 40px;}
.cv-photo{width:104px;height:104px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#eee;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#999;border:3px solid rgba(255,255,255,.6);}
.cv-photo img{width:100%;height:100%;object-fit:cover;}
.cv-titleblock h1{font-size:30px;font-weight:800;letter-spacing:-.01em;line-height:1.1;}
.cv-role{font-size:14.5px;font-weight:500;opacity:.85;margin-top:5px;letter-spacing:.02em;}
.cv-contact{display:none;flex-wrap:wrap;gap:6px 16px;font-size:11.5px;margin-top:10px;}
.cv-contact span{display:flex;align-items:center;gap:5px;}
.cv-contact svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}
/* Solo mostrar el contacto en la cabecera para plantillas sin barra lateral */
.cv-tpl4 .cv-contact, .cv-tpl22 .cv-contact, .cv-tpl29 .cv-contact,
.cv-tpl30 .cv-contact, .cv-tpl31 .cv-contact, .cv-tpl32 .cv-contact,
.cv-tpl33 .cv-contact, .cv-tpl34 .cv-contact, .cv-tpl35 .cv-contact{display:flex;}
.cv-personal svg{width:12px;height:12px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;}
.cv-info-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.cv-info-row:last-child{margin-bottom:0;}
.cv-block h2 svg{width:13px;height:13px;flex-shrink:0;}
.cv-body{display:grid;grid-template-columns:240px 1fr;min-height:900px;}
.cv-aside{padding:26px 26px;}
.cv-main{padding:30px 36px;}
.cv-block{margin-bottom:22px;}
.cv-block:last-child{margin-bottom:0;}
.cv-block h2{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cv-item{margin-bottom:14px;}
.cv-item:last-child{margin-bottom:0;}
.cv-item-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
.cv-item-title{font-size:13.5px;font-weight:700;}
.cv-item-sub{font-size:12px;opacity:.75;font-weight:500;}
.cv-item-date{font-size:10.5px;font-weight:600;opacity:.6;white-space:nowrap;}
.cv-item-desc{font-size:11.8px;line-height:1.55;margin-top:5px;opacity:.85;}
.cv-tag{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:999px;margin:0 5px 5px 0;font-weight:600;}
.cv-skillbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);margin-top:5px;overflow:hidden;}
.cv-skillbar i{display:block;height:100%;border-radius:99px;}
.cv-skill-row{font-size:11.8px;font-weight:600;margin-bottom:9px;}
.cv-summary-text{font-size:12px;line-height:1.65;opacity:.85;}
.cv-divider{height:1px;background:currentColor;opacity:.12;margin:18px 0;}

/* ===== Template 0: Por defecto ===== */
.cv-tpl0{font-family:'Arial',Helvetica,sans-serif;color:#222;}
.cv-tpl0 .tpl0-topbar{display:flex;width:100%;min-height:38px;}
.cv-tpl0 .tpl0-dni{background:#d8d8d8;color:#333;font-size:12px;font-weight:600;padding:8px 16px;display:flex;align-items:center;min-width:160px;flex-shrink:0;letter-spacing:.02em;}
.cv-tpl0 .tpl0-name{background:#2e6187;color:#fff;flex:1;display:flex;align-items:center;padding:8px 20px;font-size:18px;font-weight:700;letter-spacing:.01em;}
.cv-tpl0 .tpl0-intro{display:flex;gap:24px;padding:18px 28px;align-items:flex-start;}
.cv-tpl0 .tpl0-photo{width:110px;height:130px;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid #ccc;border-radius:6px;}
.cv-tpl0 .tpl0-photo-placeholder{width:110px;height:130px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:28px;color:#999;border:1px solid #ccc;flex-shrink:0;border-radius:6px;}
.cv-tpl0 .tpl0-personal{font-size:12.5px;line-height:1.9;color:#222;}
.cv-tpl0 .tpl0-content{padding:0 28px 32px;}
.cv-tpl0 .tpl0-section{margin-bottom:20px;}
.cv-tpl0 .tpl0-section-title{color:#2e6187;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;padding-bottom:4px;border-bottom:1.5px solid #2e6187;}
.cv-tpl0 .tpl0-item{margin-bottom:12px;}
.cv-tpl0 .tpl0-item-company{font-size:12.5px;font-weight:700;letter-spacing:.18em;margin-bottom:2px;}
.cv-tpl0 .tpl0-item-role{font-size:12px;color:#333;}
.cv-tpl0 .tpl0-item-detail{font-size:11.5px;color:#555;}
.cv-tpl0 .tpl0-skills-list{font-size:12px;line-height:1.9;color:#333;}
.cv-tpl0 .tpl0-skills-list li{list-style:disc;margin-left:18px;}

/* ===== Template 1: Minimal Clean ===== */
.cv-tpl1{font-family:'Inter',sans-serif;}
.cv-tpl1 .cv-header{flex-direction:column;align-items:center;text-align:center;padding-bottom:18px;}
.cv-tpl1 .cv-photo{width:90px;height:90px;}
.cv-tpl1 .cv-aside{background:#fafafa;border-right:1px solid #eee;}
.cv-tpl1 .cv-block h2{color:#111;border-bottom:2px solid #111;padding-bottom:6px;}
.cv-tpl1 .cv-tag{background:#f0f0f0;color:#222;}
.cv-tpl1 .cv-skillbar i{background:#111;}

/* ===== Template 2: Modern Indigo Sidebar ===== */
.cv-tpl2{font-family:'Poppins',sans-serif;}
.cv-tpl2 .cv-header{background:#3730a3;color:#fff;}
.cv-tpl2 .cv-aside{background:#312e81;color:#e0e0fb;}
.cv-tpl2 .cv-aside h2{color:#a5b4fc;}
.cv-tpl2 .cv-photo{border-color:#fff;}
.cv-tpl2 .cv-tag{background:#4338ca;color:#fff;}
.cv-tpl2 .cv-skillbar{background:rgba(255,255,255,.15);}
.cv-tpl2 .cv-skillbar i{background:#a5b4fc;}
.cv-tpl2 .cv-main h2{color:#3730a3;border-bottom:2px solid #e0e0fb;padding-bottom:6px;}

/* ===== Template 3: Elegant Serif Right Sidebar ===== */
.cv-tpl3{font-family:'Lora',serif;}
.cv-tpl3 .cv-body{grid-template-columns:1fr 230px;}
.cv-tpl3 .cv-aside{order:2;background:#faf7f2;border-left:1px solid #ece5d8;}
.cv-tpl3 .cv-main{order:1;}
.cv-tpl3 .cv-header{background:#fdfaf4;border-bottom:3px double #b08d57;}
.cv-tpl3 .cv-titleblock h1{font-family:'Playfair Display',serif;color:#3a2e1f;}
.cv-tpl3 .cv-role{color:#b08d57;}
.cv-tpl3 .cv-block h2{color:#b08d57;font-family:'Playfair Display',serif;letter-spacing:.04em;}
.cv-tpl3 .cv-tag{background:#f1e8d8;color:#5c4424;}
.cv-tpl3 .cv-skillbar i{background:#b08d57;}

/* ===== Template 4: Bold Banner Top ===== */
.cv-tpl4{font-family:'Montserrat',sans-serif;}
.cv-tpl4 .cv-body{grid-template-columns:1fr;}

.cv-tpl36 .cv-main h2{color:#f0f;font-size:11px;letter-spacing:.14em;border-bottom:1px solid #f0f3;padding-bottom:6px;text-shadow:0 0 8px #f0f6;}
.cv-tpl36 .cv-item-title{color:#fff;}
.cv-tpl36 .cv-item-sub{color:#0ff;opacity:.8;}
.cv-tpl36 .cv-tag{background:#0ff1;color:#0ff;border:1px solid #0ff4;border-radius:4px;}

.cv-tpl36 .cv-divider{background:#0ff3;opacity:1;}

/* ===== Template 37: Minimalismo Japonés ===== */
.cv-tpl37{font-family:'Inter',sans-serif;}
.cv-tpl37 .cv-header{background:#fff;padding:40px 50px 28px;border-bottom:none;flex-direction:column;align-items:flex-start;gap:0;}
.cv-tpl37 .cv-photo{display:none;}
.cv-tpl37 .cv-titleblock h1{font-size:40px;font-weight:300;letter-spacing:.04em;color:#111;line-height:1.1;}
.cv-tpl37 .cv-role{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:#bf0000;font-weight:600;margin-top:8px;}
.cv-tpl37 .cv-contact{margin-top:16px;font-size:11px;color:#666;gap:18px;}
.cv-tpl37 .cv-body{grid-template-columns:4px 1fr;min-height:auto;}
.cv-tpl37 .cv-aside{background:#bf0000;padding:0;width:4px;min-width:4px;}
.cv-tpl37 .cv-aside *{display:none;}
.cv-tpl37 .cv-main{padding:36px 50px;}
.cv-tpl37 .cv-block{margin-bottom:34px;display:grid;grid-template-columns:130px 1fr;gap:0 30px;}
.cv-tpl37 .cv-block h2{font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:#bf0000;font-weight:700;padding-top:4px;grid-column:1;}
.cv-tpl37 .cv-block > *:not(h2){grid-column:2;}
.cv-tpl37 .cv-item{margin-bottom:16px;border-left:1px solid #e5e7eb;padding-left:14px;}
.cv-tpl37 .cv-item-title{font-weight:700;font-size:13px;}
.cv-tpl37 .cv-item-sub{color:#666;font-size:11.5px;}
.cv-tpl37 .cv-tag{background:#f5f5f5;color:#444;border-radius:2px;font-size:10px;}
.cv-tpl37 .cv-skillbar i{background:#bf0000;}

/* ===== Template 38: Tarjeta de Presentación ===== */
.cv-tpl38{font-family:'Poppins',sans-serif;}
.cv-tpl38 .cv-body{grid-template-columns:280px 1fr;min-height:1123px;}
.cv-tpl38 .cv-header{display:none;}
.cv-tpl38 .cv-aside{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);color:#e8eaf6;padding:50px 28px 36px;display:flex;flex-direction:column;gap:0;}
.cv-tpl38 .cv-aside .cv-block:first-child{margin-bottom:0;padding-bottom:0;}
.cv-tpl38 .cv-aside .cv-personal{order:-2;margin-bottom:36px;}
.cv-tpl38 .cv-aside .cv-personal::before{content:'';display:block;width:70px;height:70px;border-radius:50%;background:url() center/cover;margin-bottom:18px;}
.cv-tpl38 .cv-photo-aside{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e94560;margin-bottom:16px;display:block;}
.cv-tpl38 .cv-aside h2{color:#e94560;font-size:10px;letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid #e9456040;padding-bottom:6px;}
.cv-tpl38 .cv-info-row{color:#b0b8d1;font-size:11.5px;}
.cv-tpl38 .cv-tag{background:#e9456020;color:#e94560;border:1px solid #e9456040;}
.cv-tpl38 .cv-skillbar{background:rgba(255,255,255,.1);}
.cv-tpl38 .cv-skillbar i{background:#e94560;}
.cv-tpl38 .cv-main{padding:50px 40px;}
.cv-tpl38 .cv-main::before{content:attr(data-name);font-size:32px;font-weight:800;color:#1a1a2e;display:block;line-height:1.1;margin-bottom:4px;}
.cv-tpl38 .cv-main::after{content:attr(data-role);font-size:13px;color:#e94560;font-weight:600;letter-spacing:.06em;display:block;margin-bottom:30px;}
.cv-tpl38 .cv-main h2{color:#1a1a2e;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border-bottom:2px solid #e94560;padding-bottom:6px;}
.cv-tpl38 .cv-item-title{color:#1a1a2e;font-weight:700;}
.cv-tpl38 .cv-item-date{color:#e94560;font-size:10px;font-weight:700;}

/* ===== Template 39: Origami Diagonal ===== */
.cv-tpl39{font-family:'Montserrat',sans-serif;}
.cv-tpl39 .cv-header{position:relative;overflow:hidden;background:#fff;padding:40px 40px 60px;}
.cv-tpl39 .cv-header::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 260px 200px 0;border-color:transparent #ff6b35 transparent transparent;}
.cv-tpl39 .cv-header::after{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 220px 170px 0;border-color:transparent #ff8c42 transparent transparent;}
.cv-tpl39 .cv-titleblock{position:relative;z-index:2;}
.cv-tpl39 .cv-titleblock h1{font-size:26px;font-weight:800;color:#1a1a1a;}
.cv-tpl39 .cv-role{color:#ff6b35;font-weight:700;}
.cv-tpl39 .cv-photo{position:absolute;right:20px;top:16px;border:3px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:3;}
.cv-tpl39 .cv-body{grid-template-columns:220px 1fr;}
.cv-tpl39 .cv-aside{background:#fef9f6;}
.cv-tpl39 .cv-aside h2{color:#ff6b35;font-size:11px;letter-spacing:.1em;border-bottom:2px solid #ff6b3530;padding-bottom:5px;}
.cv-tpl39 .cv-main h2{color:#1a1a1a;font-size:11px;letter-spacing:.1em;display:flex;align-items:center;gap:8px;}
.cv-tpl39 .cv-main h2::after{content:'';flex:1;height:1px;background:#e5e7eb;}
.cv-tpl39 .cv-tag{background:#ff6b3515;color:#ff6b35;border-radius:3px;}
.cv-tpl39 .cv-skillbar i{background:#ff6b35;}
.cv-tpl39 .cv-item{border-left:2px solid #ff6b3540;padding-left:12px;}

/* ===== Template 30: Limpia Sin Lateral (1 columna centrada) ===== */
.cv-tpl30{font-family:'Inter',sans-serif;}

.cv-tpl30 .cv-photo{width:84px;height:84px;}
.cv-tpl30 .cv-body{grid-template-columns:1fr;}
.cv-tpl30 .cv-aside{display:none;}
.cv-tpl30 .cv-main{padding:30px 50px;}
.cv-tpl30 .cv-contact{display:flex;justify-content:center;}

.cv-tpl30 .cv-skillbar i{background:#374151;}

/* ===== Template 31: Acento Verde Lima (1 columna) ===== */
.cv-tpl31{font-family:'Montserrat',sans-serif;}
.cv-tpl31 .cv-header{background:#fff;border-left:8px solid #65a30d;padding-left:32px;}
.cv-tpl31 .cv-titleblock h1{font-weight:800;}
.cv-tpl31 .cv-role{color:#65a30d;font-weight:700;}
.cv-tpl31 .cv-body{grid-template-columns:1fr;}
.cv-tpl31 .cv-aside{display:none;}
.cv-tpl31 .cv-main{padding:26px 40px 26px 38px;}
.cv-tpl31 .cv-contact{display:flex;}
.cv-tpl31 .cv-block h2{color:#65a30d;border-bottom:2px solid #ecfccb;padding-bottom:6px;}

.cv-tpl31 .cv-skillbar i{background:#65a30d;}
.cv-tpl31 .cv-item{border-left:2px solid #ecfccb;padding-left:14px;}

/* ===== Template 32: Dos Columnas Iguales ===== */
.cv-tpl32{font-family:'Inter',sans-serif;}
.cv-tpl32 .cv-header{background:#0f172a;color:#fff;padding:28px 36px;}

.cv-tpl32 .cv-main{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0;}
.cv-tpl32 .cv-main .cv-block{padding:22px 26px;margin-bottom:0;border-bottom:1px solid #f1f5f9;}
.cv-tpl32 .cv-block:nth-child(odd){border-right:1px solid #f1f5f9;}
.cv-tpl32 .cv-block h2{color:#0f172a;font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
.cv-tpl32 .cv-tag{background:#e0f2fe;color:#0369a1;}
.cv-tpl32 .cv-skillbar i{background:#38bdf8;}

/* ===== Template 33: Infografía (línea de tiempo central) ===== */
.cv-tpl33{font-family:'Poppins',sans-serif;}
.cv-tpl33 .cv-header{background:linear-gradient(135deg,#7c3aed 0%,#db2777 100%);color:#fff;flex-direction:column;align-items:center;text-align:center;padding:40px;}
.cv-tpl33 .cv-photo{border:5px solid rgba(255,255,255,.4);}
.cv-tpl33 .cv-contact{display:flex;justify-content:center;}
.cv-tpl33 .cv-body{grid-template-columns:1fr;}
.cv-tpl33 .cv-aside{display:none;}
.cv-tpl33 .cv-main{padding:32px 40px;}
.cv-tpl33 .cv-block h2{color:#7c3aed;}
.cv-tpl33 .cv-item{background:#faf5ff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #db2777;}
.cv-tpl33 .cv-item:last-child{margin-bottom:0;}
.cv-tpl33 .cv-tag{background:linear-gradient(135deg,#ede9fe,#fce7f3);color:#7c3aed;}
.cv-tpl33 .cv-skillbar i{background:linear-gradient(90deg,#7c3aed,#db2777);}

/* ===== Template 34: Cabecera Foto Pantalla Completa ===== */
.cv-tpl34{font-family:'Raleway',sans-serif;}
.cv-tpl34 .cv-header{flex-direction:row-reverse;background:#111827;color:#fff;padding:40px 44px;gap:30px;}
.cv-tpl34 .cv-photo{width:130px;height:130px;border-radius:14px;border:none;flex-shrink:0;}
.cv-tpl34 .cv-titleblock h1{font-size:28px;font-weight:800;}
.cv-tpl34 .cv-role{color:#f9a8d4;font-weight:600;}
.cv-tpl34 .cv-body{grid-template-columns:1fr;}
.cv-tpl34 .cv-aside{display:none;}
.cv-tpl34 .cv-contact{display:flex;color:#d1d5db;}
.cv-tpl34 .cv-main{padding:30px 44px;}
.cv-tpl34 .cv-block h2{color:#111827;border-bottom:2px solid #111827;padding-bottom:6px;}
.cv-tpl34 .cv-tag{background:#111827;color:#fff;border-radius:4px;}
.cv-tpl34 .cv-skillbar i{background:#111827;}

.cv-tpl35{font-family:'Inter',sans-serif;}

.cv-tpl35 .cv-tag{background:#e8eeff;color:#003399;border-radius:3px;}

/* ===================== STATE ===================== */
const STORAGE_KEY = 'cvstudio_data_v1';
let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { profiles: [], currentProfileId: null, theme: 'claro', view: 'profiles', dataTab: 'personal' };
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

function emptyProfile(name){
  return {
    id: uid(),

}
function currentProfile(){ return state.profiles.find(p=>p.id===state.currentProfileId) || null; }

/* ===================== TOAST ===================== */
let toastTimer=null;
function toast(msg, icon){
  const el = document.getElementById('toast');
  el.innerHTML = (icon?ic(icon):ic('check')) + `<span>${msg}</span>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

/* ===================== SELECTOR DE PERFILES (ventana) ===================== */
function openProfileSwitcherModal(){
  openModal(`
    <h2 style="display:flex;align-items:center;gap:8px;">${ic('users')} Tus perfiles</h2>
    <p class="desc">Toca un perfil para activarlo y editarlo.</p>
    <div id="switcherBody"></div>
  `);
  renderProfileSwitcherBody();
}
function renderProfileSwitcherBody(){
  const body = document.getElementById('switcherBody');
  if(!body) return;
  const prof = currentProfile();
  body.innerHTML = `
    <div class="profile-strip" id="switcherStrip"></div>
    ${prof ? `
      <div class="profile-actions-row">
        <button class="btn btn-ghost btn-sm" id="mRenameBtn">${ic('edit')} Renombrar</button>
        <button class="btn btn-ghost btn-sm" id="mDupBtn">${ic('copy')} Duplicar</button>
        <button class="btn btn-danger btn-sm" id="mDelBtn">${ic('trash')} Eliminar</button>
      </div>
    `:''}
  `;
  const strip = document.getElementById('switcherStrip');
  state.profiles.forEach(p=>{
    const chip = document.createElement('div');
    chip.className = 'profile-chip-lg' + (p.id===state.currentProfileId?' active':'');
    chip.innerHTML = `<div class="ava">${p.foto?`<img src="${p.foto}">`:initials(p)}</div><span>${esc(p.personal.nombre||p.nombrePerfil)}</span>`;
    chip.addEventListener('click', ()=>{
      state.currentProfileId = p.id;
      state.view = 'perfil';
      if(!state.perfilTab) state.perfilTab = 'datos';
      saveState();
      closeModal();
      render();
    });
    strip.appendChild(chip);
  });
  const addChip = document.createElement('div');
  addChip.className = 'profile-chip-lg add';
  addChip.innerHTML = `<div class="ava">${ic('plus')}</div><span>Nuevo</span>`;
  addChip.addEventListener('click', confirmCreateProfile);
  strip.appendChild(addChip);

  if(prof){
    document.getElementById('mRenameBtn').addEventListener('click', ()=>{
      promptModal('Renombrar perfil','Nombre interno del perfil (no aparece en el CV)', prof.nombrePerfil, (val)=>{
        if(val){
          prof.nombrePerfil = val; saveState(); render();
          openProfileSwitcherModal();
        }
      });
    });
    document.getElementById('mDupBtn').addEventListener('click', ()=>{
      const copy = JSON.parse(JSON.stringify(prof));
      copy.id = uid(); copy.nombrePerfil = prof.nombrePerfil + ' (copia)';
      state.profiles.push(copy); state.currentProfileId = copy.id; saveState();
      toast('Perfil duplicado','check');
      renderProfileSwitcherBody();
    });
    document.getElementById('mDelBtn').addEventListener('click', ()=>{
      confirmModal('Eliminar perfil', '¿Seguro que quieres eliminar este perfil? Esta acción no se puede deshacer.', ()=>{
        state.profiles = state.profiles.filter(p=>p.id!==prof.id);
        state.currentProfileId = state.profiles[0]?.id || null;
        saveState();
        toast('Perfil eliminado','trash');
        if(state.profiles.length===0){ closeModal(); render(); }
        else renderProfileSwitcherBody();
      });
    });
  }
}

function initials(p){
  const n = (p.personal.nombre||p.nombrePerfil||'?').trim();
  return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || '?';
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderView(){
  const mv = document.getElementById('mainView');
  if(state.view==='config') return renderOptionsView(mv);
  return renderPerfilView(mv);
}

/* ===================== VIEW: PERFIL (selector + 2 pestañas) ===================== */
function createProfile(name){
  const p = emptyProfile(name || ('Perfil ' + (state.profiles.length+1)));
  state.profiles.push(p);
  state.currentProfileId = p.id;
  state.view = 'perfil';
  state.perfilTab = 'datos';
  saveState();
  render();
  toast('Perfil creado, completa sus datos','plus');
}
function confirmCreateProfile(){
  openModal(`
    <h2 style="display:flex;align-items:center;gap:8px;">${ic('plus')} Nuevo perfil</h2>
    <p class="desc">Escribe un nombre para identificar este perfil (por ejemplo, tu nombre o el de la persona).</p>
    <div class="field"><input type="text" id="newProfileNameInput" placeholder="Ej. Javier Pérez" autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalConfirmCreate">${ic('plus')} Crear perfil</button>
    </div>
  `);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  const input = document.getElementById('newProfileNameInput');
  setTimeout(()=>input && input.focus(), 60);
  const doCreate = ()=>{
    const name = input.value.trim();
    if(!name){ toast('Escribe un nombre para el perfil','trash'); input.focus(); return; }
    closeModal();
    createProfile(name);
  };
  document.getElementById('modalConfirmCreate').addEventListener('click', doCreate);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); doCreate(); } });
}

function renderPerfilView(mv){
  if(state.profiles.length===0){
    mv.innerHTML = noProfileState();
    bindNoProfile(mv);
    return;
  }
  if(!currentProfile()){ state.currentProfileId = state.profiles[0].id; saveState(); }
  const prof = currentProfile();

  mv.innerHTML = `
    <div class="view" style="padding-top:24px;">
      <div class="perfil-tabs">
        <button class="perfil-tab ${state.perfilTab==='datos'||!state.perfilTab?'active':''}" data-ptab="datos"><span class="ptab-icon">${ic('edit')}</span><span>Introducir datos</span></button>
        <button class="perfil-tab ${state.perfilTab==='preview'?'active':''}" data-ptab="preview"><span class="ptab-icon">${ic('eye')}</span><span>Currículum</span></button>
        <button class="perfil-tab ${state.perfilTab==='carta'?'active':''}" data-ptab="carta"><span class="ptab-icon">${ic('envelope')}</span><span>Carta de presentación</span></button>
      </div>

      <div id="perfilTabContent"></div>
    </div>
  `;

function renderDatosTabContent(content, prof){
  // Si ya existe la barra, solo actualizamos estados activos y el contenido
  const existingRow = document.getElementById('dataTabs');
  if(existingRow){
    const scrollLeft = existingRow.scrollLeft;
    existingRow.querySelectorAll('.tab-tile').forEach(btn=>{
      const tid = btn.dataset.tab;
      const count = Array.isArray(prof[tid]) ? prof[tid].length : null;
      btn.className = 'tab-tile' + (state.dataTab===tid?' active':'');
      const countEl = btn.querySelector('.count');
      if(count!==null && count>0){
        if(countEl) countEl.textContent=count;
        else { const s=document.createElement('span'); s.className='count'; s.textContent=count; btn.insertBefore(s,btn.firstChild); }
      } else if(countEl){ countEl.remove(); }
    });
    existingRow.scrollLeft = scrollLeft;
    const inner = document.getElementById('dataTabContent');
    if(inner){
      if(state.dataTab==='personal') renderPersonalTab(inner, prof);
      else if(state.dataTab==='carta') renderCartaFormTab(inner, prof);
      else renderListTab(inner, prof, state.dataTab);
      return;
    }
  }

  // Primera vez: construir la barra desde cero
  content.innerHTML = `
    <div class="tabs-row" id="dataTabs"></div>
    <div id="dataTabContent"></div>
  `;
  const tabsRow = document.getElementById('dataTabs');
  DATA_TABS.forEach(t=>{
    const count = Array.isArray(prof[t.id]) ? prof[t.id].length : null;
    const btn = document.createElement('button');
    btn.className = 'tab-tile' + (state.dataTab===t.id?' active':'');
    btn.dataset.tab = t.id;
    btn.innerHTML = `
      ${(count!==null && count>0) ? `<span class="count">${count}</span>` : ''}
      <span class="tab-tile-icon">${ic(t.icon)}</span>
      <span>${t.label}</span>
    `;
    btn.addEventListener('click',()=>{ state.dataTab=t.id; saveState(); renderDatosTabContent(content, prof); });
    tabsRow.appendChild(btn);
  });
  const inner = document.getElementById('dataTabContent');
  if(state.dataTab==='personal') renderPersonalTab(inner, prof);
  else if(state.dataTab==='carta') renderCartaFormTab(inner, prof);
  else renderListTab(inner, prof, state.dataTab);
}

let openEntrySet = new Set();

function renderListTab(content, prof, key){
  const cfg = LIST_CONFIG[key];
  if(!Array.isArray(prof[key])) prof[key] = [];
  const list = prof[key];
  list.forEach(it=>{ if(!it._id) it._id = uid(); });
  content.innerHTML = `
    <div class="card card-pad">
      <div class="section-title"><div class="ic-badge">${ic(cfg.icon)}</div> ${cfg.title}</div>
      <div class="section-sub">${cfg.sub}</div>
      <div id="listEntries"></div>
      <button class="btn btn-soft" id="addEntryBtn" style="margin-top:4px;">${ic('plus')} Añadir ${cfg.title.toLowerCase()}</button>
    </div>
  `;
  const entriesWrap = document.getElementById('listEntries');
  if(list.length===0){
    entriesWrap.innerHTML = `<div class="empty-hint">${ic(cfg.icon)}<div style="margin-top:6px;">Todavía no has añadido nada aquí</div></div>`;
  }
  list.forEach((item,idx)=>{
    const card = document.createElement('div');
    const entryKey = key+':'+item._id;
    const isOpen = !cfg.collapsible || openEntrySet.has(entryKey);
    card.className = 'entry-card' + (cfg.collapsible?' collapsible':'') + (isOpen?' open':'');
    if(cfg.collapsible){
      card.innerHTML = `
        <div class="entry-head" data-toggle>
          <div class="entry-head-main">
            <span class="entry-num">${esc(cfg.summary(item))}</span>
            <span class="entry-detail">${esc(cfg.detail ? cfg.detail(item) : '')}</span>
          </div>
          <div class="entry-head-actions">
            <button class="icon-btn" data-rm="${idx}">${ic('trash')}</button>
            <span class="chevron">${ic('chevronDown')}</span>
          </div>
        </div>
        <div class="entry-body" style="display:${isOpen?'block':'none'}">
          <div class="grid" data-fields></div>
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="entry-head">
          <span class="entry-num">${esc(cfg.summary(item))}</span>
          <button class="icon-btn" data-rm="${idx}">${ic('trash')}</button>
        </div>
        <div class="grid" data-fields></div>
      `;
    }
    entriesWrap.appendChild(card);
    const fgrid = card.querySelector('[data-fields]');
    cfg.fields.forEach(f=>{
      const wrap = document.createElement('div');
      wrap.className = 'field' + (f.full?' full':'');
      if(f.type==='checkbox'){
        wrap.innerHTML = `<label>&nbsp;</label><div class="checkrow"><input type="checkbox" data-it="${f.k}" ${item[f.k]?'checked':''}> ${f.label}</div>`;
      } else if(f.type==='textarea'){
        wrap.innerHTML = `<label>${f.label}</label><textarea data-it="${f.k}">${esc(item[f.k])}</textarea>`;
      } else if(f.type==='select'){
        wrap.innerHTML = `<label>${f.label}</label><select data-it="${f.k}">${f.options.map(o=>`<option value="${o}" ${item[f.k]===o?'selected':''}>${o}</option>`).join('')}</select>`;
      } else {
        wrap.innerHTML = `<label>${f.label}</label><input type="${f.type||'text'}" value="${esc(item[f.k])}" data-it="${f.k}">`;
      }
      fgrid.appendChild(wrap);
    });
    fgrid.querySelectorAll('[data-it]').forEach(inp=>{
      const evt = inp.type==='checkbox' ? 'change' : 'input';
      inp.addEventListener(evt, ()=>{
        item[inp.dataset.it] = inp.type==='checkbox' ? inp.checked : inp.value;
        saveState();
        const numEl = card.querySelector('.entry-num');
        if(numEl) numEl.textContent = cfg.summary(item);
        const detEl = card.querySelector('.entry-detail');
        if(detEl && cfg.detail) detEl.textContent = cfg.detail(item);
      });
    });
    card.querySelector('[data-rm]').addEventListener('click', (e)=>{
      e.stopPropagation();
      openEntrySet.delete(entryKey);
      prof[key].splice(idx,1); saveState(); renderListTab(content, prof, key);
    });
    if(cfg.collapsible){
      card.querySelector('[data-toggle]').addEventListener('click', ()=>{
        if(openEntrySet.has(entryKey)) openEntrySet.delete(entryKey);
        else openEntrySet.add(entryKey);
        renderListTab(content, prof, key);
      });
    }
  });
  document.getElementById('addEntryBtn').addEventListener('click', ()=>{
    const newItem = { _id: uid() };
    cfg.fields.forEach(f=>{ newItem[f.k] = f.type==='checkbox' ? false : ''; });
    list.push(newItem);
    if(cfg.collapsible) openEntrySet.add(key+':'+newItem._id);
    saveState();
    renderListTab(content, prof, key);
  });
}

/* Miniaturas de plantillas CV (colores representativos sin renderizar HTML) */
function openTemplatePickerModal(prof){
  // Abre el modal al instante con placeholders, luego renderiza el CV real al hacerse visible
  const grid = TEMPLATES.map(t=>`
    <div class="tpl-card ${prof.plantilla===t.id?'selected':''}" data-tpl="${t.id}">
      <div class="tpl-thumb lazy-thumb" data-tplid="${t.id}">
        <div class="tpl-thumb-placeholder">
          <span>${t.name}</span>
        </div>
      </div>
      <div class="tpl-label"><span>${t.name}</span><div class="chk">${prof.plantilla===t.id?ic('check'):''}</div></div>
    </div>
  `).join('');
  openModal(`
    <h2>Elegir plantilla</h2>
    <p class="desc">Selecciona uno de los ${TEMPLATES.length} diseños disponibles.</p>
    <div class="tpl-grid modal-tpl-grid" id="tplPickerGrid">${grid}</div>
  `, 'modal-wide');

  // Renderiza el CV real al entrar en el viewport (carga diferida)
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      const thumb = entry.target;
      const tplId = thumb.dataset.tplid;
      if(thumb.dataset.rendered) return;
      thumb.dataset.rendered = '1';
      thumb.innerHTML = `<div class="tpl-thumb-scaled">${buildCvHtml(prof, tplId)}</div>`;
      observer.unobserve(thumb);
    });
  }, { root: document.querySelector('.modal-tpl-grid'), rootMargin:'40px', threshold:0 });

  document.querySelectorAll('#tplPickerGrid .lazy-thumb').forEach(el=>observer.observe(el));

  document.querySelectorAll('#modalRoot [data-tpl]').forEach(card=>{
    card.addEventListener('click', ()=>{
      prof.plantilla = card.dataset.tpl;
      saveState();
      closeModal();
      toast('Plantilla actualizada','layout');
      renderView();
    });
  });
}

function openCoverLetterTemplatePicker(prof, onApplied){
  const grid = CL_TEMPLATES.map(t=>`
    <div class="tpl-card ${prof.plantillaCarta===t.id?'selected':''}" data-cltpl="${t.id}">
      <div class="tpl-thumb lazy-thumb" data-tplid="${t.id}" data-tpltype="cl">
        <div class="tpl-thumb-placeholder"><span>${t.name}</span></div>
      </div>
      <div class="tpl-label"><span>${t.name}</span><div class="chk">${prof.plantillaCarta===t.id?ic('check'):''}</div></div>
    </div>
  `).join('');
  openModal(`
    <h2 style="display:flex;align-items:center;gap:8px;">${ic('layout')} Plantilla de la carta</h2>
    <p class="desc">Selecciona uno de los ${CL_TEMPLATES.length} diseños disponibles.</p>
    <div class="tpl-grid modal-tpl-grid" id="clPickerGrid">${grid}</div>
  `, 'modal-wide');

  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      const thumb = entry.target;
      const tplId = thumb.dataset.tplid;
      if(thumb.dataset.rendered) return;
      thumb.dataset.rendered = '1';
      thumb.innerHTML = `<div class="tpl-thumb-scaled">${buildLetterHtml(prof, tplId)}</div>`;
      observer.unobserve(thumb);
    });
  }, { root: document.querySelector('.modal-tpl-grid'), rootMargin:'40px', threshold:0 });

  document.querySelectorAll('#clPickerGrid .lazy-thumb').forEach(el=>observer.observe(el));

  document.querySelectorAll('#modalRoot [data-cltpl]').forEach(card=>{
    card.addEventListener('click', ()=>{
      prof.plantillaCarta = card.dataset.cltpl;
      saveState();
      closeModal();
      toast('Plantilla de carta actualizada','layout');
      if(typeof onApplied === 'function') onApplied();
    });
  });
}

function downloadLetterPdf(prof, holderId){
  const holder = document.getElementById(holderId || 'clInlineHolder');
  if(!holder) return;
  const frame = holder.closest('.canvas-frame');
  const page = holder.querySelector('.cl-page');
  const prevTransform = holder.style.transform;
  const prevFrameW = frame ? frame.style.width : '';
  const prevFrameH = frame ? frame.style.height : '';
  const prevFrameOverflow = frame ? frame.style.overflow : '';
  holder.style.transform = 'none';
  if(frame){ frame.style.width = 'auto'; frame.style.height = 'auto'; frame.style.overflow = 'visible'; }
  toast('Generando PDF, espera un momento…','download');
  html2canvas(page, {scale:2, useCORS:true, backgroundColor:'#ffffff'}).then(canvas=>{
    holder.style.transform = prevTransform;
    if(frame){ frame.style.width = prevFrameW; frame.style.height = prevFrameH; frame.style.overflow = prevFrameOverflow; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageW = 210, pageH = 297;
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;
    let heightLeft = imgH;
    let position = 0;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    pdf.addImage(imgData,'JPEG',0,position,imgW,imgH);
    heightLeft -= pageH;
    while(heightLeft > 0){
      position = heightLeft - imgH;
      pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,position,imgW,imgH);
      heightLeft -= pageH;
    }
    const fname = 'Carta_presentacion_' + ((prof.personal.nombre||'perfil')+'_'+(prof.personal.apellidos||'')).trim().replace(/\s+/g,'_');
    pdf.save(fname+'.pdf');
    toast('PDF descargado correctamente','check');
  }).catch(()=>{
    holder.style.transform = prevTransform;
    if(frame){ frame.style.width = prevFrameW; frame.style.height = prevFrameH; frame.style.overflow = prevFrameOverflow; }
    toast('No se pudo generar el PDF','trash');
  });
}

/* ===================== CV RENDER ENGINE ===================== */
function fmtDate(v){
  if(!v) return '';
  const parts = v.split('-');
  if(parts.length===2){
    const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return meses[parseInt(parts[1],10)-1] + ' ' + parts[0];
  }
  return v;
}
function dateRange(it){
  const ini = fmtDate(it.inicio);
  const fin = it.actual ? 'Actualidad' : fmtDate(it.fin);
  if(!ini && !fin) return '';
  return [ini,fin].filter(Boolean).join(' — ');
}

function levelPct(nivel, scaleOf){
  const map5 = {'Básico':30,'Intermedio':55,'Avanzado':75,'Bilingüe':92,'Nativo':100};
  const map4 = {'Básico':30,'Medio':55,'Avanzado':80,'Experto':100};
  if(scaleOf===5) return map5[nivel]||50;
  return map4[nivel]||50;
}

    const card = document.createElement('div');

    card.innerHTML = `
      <div class="theme-mockup">${buildThemeMockup(th)}</div>
      <b>${th.name}</b>
    `;
    card.addEventListener('click', ()=>{ state.theme = th.id; saveState(); render(); });
    tg.appendChild(card);
  });
  document.getElementById('openExportBtn').addEventListener('click', openExportModal);
  document.getElementById('importInput').addEventListener('change', handleImportFile);
  document.getElementById('accTemasBtn').addEventListener('click', ()=>toggleAccordion('temas', mv));
  document.getElementById('accRespaldoBtn').addEventListener('click', ()=>toggleAccordion('respaldo', mv));

  // Triple toque sobre la versión para mostrar la fecha
  let versionTapCount = 0, versionTapTimer = null;
  const versionRow = document.getElementById('infoVersionRow');
  if(versionRow){
    versionRow.addEventListener('click', ()=>{
      versionTapCount++;
      clearTimeout(versionTapTimer);
      if(versionTapCount >= 3){
        versionTapCount = 0;
        const fechaRow = document.getElementById('infoFechaRow');
        if(fechaRow) fechaRow.style.display = fechaRow.style.display==='none' ? 'flex' : 'none';
      } else {
        versionTapTimer = setTimeout(()=>{ versionTapCount=0; }, 700);
      }
    });
  }
}

function toggleAccordion(key, mv){
  accordionOpenState[key] = !accordionOpenState[key];
  renderOptionsView(mv);
}

/* ===================== EXPORT / IMPORT ===================== */
function openExportModal(){
  if(state.profiles.length===0){ toast('No hay perfiles para exportar','trash'); return; }
  const rows = state.profiles.map(p=>`
    <label class="import-row">
      <input type="checkbox" value="${p.id}" class="exp-chk" checked>
      <div class="ava">${p.foto?`<img src="${p.foto}">`:initials(p)}</div>
      <span>${esc(p.personal.nombre+' '+p.personal.apellidos).trim()||esc(p.nombrePerfil)}</span>
    </label>
  `).join('');
  openModal(`
    <h2>Exportar perfiles</h2>
    <p class="desc">Selecciona los perfiles que quieres incluir en el archivo exportado.</p>
    <div class="import-list">${rows}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalExportConfirm">${ic('download')} Exportar</button>
    </div>
  `);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalExportConfirm').addEventListener('click', ()=>{
    const ids = Array.from(document.querySelectorAll('.exp-chk:checked')).map(c=>c.value);
    if(ids.length===0){ toast('Selecciona al menos un perfil','trash'); return; }
    const data = { exportedAt: new Date().toISOString(), profiles: state.profiles.filter(p=>ids.includes(p.id)) };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cvstudio_perfiles_'+Date.now()+'.json';
    a.click();
    closeModal();
    toast('Perfiles exportados','download');
  });
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try{ data = JSON.parse(reader.result); }catch(err){ toast('Archivo no válido','trash'); return; }
    const incoming = Array.isArray(data) ? data : (data.profiles||[]);
    if(!incoming.length){ toast('No se encontraron perfiles en el archivo','trash'); return; }
    const rows = incoming.map((p,idx)=>`
      <label class="import-row">
        <input type="checkbox" value="${idx}" class="imp-chk" checked>
        <div class="ava">${p.foto?`<img src="${p.foto}">`:'?'}</div>
        <span>${esc((p.personal?.nombre||'')+' '+(p.personal?.apellidos||'')).trim()||esc(p.nombrePerfil||'Perfil sin nombre')}</span>
      </label>
    `).join('');
    openModal(`
      <h2>Importar perfiles</h2>
      <p class="desc">Selecciona qué perfiles del archivo quieres importar.</p>
      <div class="import-list">${rows}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
        <button class="btn btn-primary" id="modalImportConfirm">${ic('upload')} Importar</button>
      </div>
    `);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalImportConfirm').addEventListener('click', ()=>{
      const idxs = Array.from(document.querySelectorAll('.imp-chk:checked')).map(c=>parseInt(c.value,10));
      if(idxs.length===0){ toast('Selecciona al menos un perfil','trash'); return; }
      idxs.forEach(i=>{
        const p = JSON.parse(JSON.stringify(incoming[i]));
        p.id = uid(); // avoid id collisions
        // backfill any missing arrays/fields for older exports
        p.personal = Object.assign({nombre:'',apellidos:'',puesto:'',email:'',telefono:'',direccion:'',ciudad:'',web:'',nacimiento:'',nacionalidad:'',documentoId:'',mostrarDocumentoId:false,sobreMi:''}, p.personal||{});
        ['experiencia','formacion','cursos','idiomas','habilidades','otros'].forEach(k=>{ if(!Array.isArray(p[k])) p[k]=[]; });
        if(!p.plantilla) p.plantilla = 'cv-tpl1';
        if(!p.plantillaCarta) p.plantillaCarta = 'cl-tpl1';
        if(!p.carta || typeof p.carta!=='object') p.carta = { destinatario:'', empresa:'', asunto:'', cuerpo:'' };
        if(!p.nombrePerfil) p.nombrePerfil = 'Perfil importado';
        state.profiles.push(p);
      });
      saveState();
      closeModal();
      toast(idxs.length+' perfil(es) importado(s)','check');
      render();
    });
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ===================== MODALS ===================== */
function openModal(innerHtml, extraClass){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-bg" id="modalBg"><div class="modal ${extraClass||''}">${innerHtml}</div></div>`;
  requestAnimationFrame(()=>document.getElementById('modalBg').classList.add('show'));
  document.getElementById('modalBg').addEventListener('click',(e)=>{ if(e.target.id==='modalBg') closeModal(); });
}
function closeModal(){
  const bg = document.getElementById('modalBg');
  if(!bg) return;
  bg.classList.remove('show');
  setTimeout(()=>{ document.getElementById('modalRoot').innerHTML=''; }, 200);
}
function confirmModal(title, desc, onConfirm){
  openModal(`
    <h2>${title}</h2>
    <p class="desc">${desc}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-danger" id="modalConfirm">${ic('trash')} Eliminar</button>
    </div>
  `);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalConfirm').addEventListener('click', ()=>{ closeModal(); onConfirm(); });
}
function promptModal(title, desc, value, onSave){
  openModal(`
    <h2>${title}</h2>
    <p class="desc">${desc}</p>
    <div class="field"><input type="text" id="promptInput" value="${esc(value)}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">${ic('check')} Guardar</button>
    </div>
  `);
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalSave').addEventListener('click', ()=>{
    const v = document.getElementById('promptInput').value.trim();
    closeModal(); onSave(v);
  });
}

/* ===================== INIT ===================== */
if(state.profiles.length===0){
  const demo = emptyProfile('Mi primer perfil');
  state.profiles.push(demo);
  state.currentProfileId = demo.id;
}
if(!state.currentProfileId && state.profiles.length){ state.currentProfileId = state.profiles[0].id; }
if(!state.dataTab) state.dataTab = 'personal';
if(!state.perfilTab) state.perfilTab = 'datos';
if(!state.view || state.view==='profiles' || state.view==='data' || state.view==='templates' || state.view==='preview' || state.view==='options'){
  state.view = (state.view==='options') ? 'config' : 'perfil';
}
saveState();
render();
</script>
